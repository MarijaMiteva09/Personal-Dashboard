<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Dashboard</title>

    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <button id="drawer-toggle">☰</button>

    <aside id="left-sidebar">
      <div class="dashboard">
        <section id="weather-card"></section>

        <div class="news-section">
          <h2 class="news-title">Latest News</h2>
          <div id="news-list"></div>
        </div>
      </div>
    </aside>

    <div id="content">
      <main id="main-content">
        <section id="hero">
          <div class="search-container">
            <span class="search-icon">⌕</span>

            <input
              type="text"
              id="dashboard-search"
              placeholder="Search notes, events, news..."
            />
          </div>

          <div id="greeting"></div>
        </section>

        <section id="charts"></section>
        <section id="spotify"></section>
      </main>

      <aside id="right-sidebar">
  <!-- Calendar -->
  <section id="calendar">

    <div class="calendar-card">

      <div class="calendar-header">
        <button class="calendar-btn">&#10094;</button>

        <h2 class="month-year">July 2026</h2>

        <button class="calendar-btn">&#10095;</button>
      </div>

      <div class="calendar-weekdays">
        <span>Mo</span>
        <span>Tu</span>
        <span>We</span>
        <span>Th</span>
        <span>Fr</span>
        <span>Sa</span>
        <span>Su</span>
      </div>

      <div class="calendar-days">

        <span class="empty"></span>
        <span class="empty"></span>

        <div class="day">1</div>
        <div class="day">2</div>
        <div class="day">3</div>
        <div class="day">4</div>
        <div class="day">5</div>

        <div class="day">6</div>
        <div class="day">7</div>
        <div class="day">8</div>
        <div class="day">9</div>
        <div class="day">10</div>
        <div class="day">11</div>
        <div class="day">12</div>

        <div class="day">13</div>
        <div class="day">14</div>
        <div class="day today">15</div>
        <div class="day">16</div>
        <div class="day">17</div>
        <div class="day">18</div>
        <div class="day">19</div>

        <div class="day">20</div>
        <div class="day">21</div>
        <div class="day">22</div>
        <div class="day">23</div>
        <div class="day">24</div>
        <div class="day">25</div>
        <div class="day">26</div>

        <div class="day">27</div>
        <div class="day">28</div>
        <div class="day">29</div>
        <div class="day">30</div>
        <div class="day">31</div>

      </div>

      <div class="calendar-actions">
    <button id="add-event-btn">
        + Add Event
    </button>
</div>

    </div>

  </section>

  <!-- Timeline -->
  <section id="timeline">

    <h2 class="timeline-title">
      Today's Timeline
    </h2>

    <div class="timeline-card">

      <span class="time">09:00</span>

      <div class="timeline-info">
        <h3>Dashboard Development</h3>
        <p>Finish the calendar feature.</p>
      </div>

    </div>

    <div class="timeline-card">

      <span class="time">18:00</span>

      <div class="timeline-info">
        <h3>Basketball Practice</h3>
        <p>Team training.</p>
      </div>

    </div>

  </section>

</aside>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
