<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Dashboard</title>

    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body>
    <button id="drawer-toggle">☰</button>

    <aside id="left-sidebar">
      <div class="dashboard">
        <section id="weather-card"></section>

        <div class="news-section">
          <h2 class="news-title">Latest News</h2>
          <div id="news-list"></div>
        </div>
      </div>
    </aside>

    <div id="content">
      <main id="main-content">
        <section id="hero">
          <div class="search-container">
            <span class="search-icon">⌕</span>

            <input
              type="text"
              id="dashboard-search"
              placeholder="Search notes, events, news..."
            />
          </div>

          <div id="greeting"></div>
        </section>

        <section id="charts"></section>
        <section id="spotify"></section>
      </main>

    <aside id="right-sidebar">
    <section id="calendar">

        <div class="calendar-header">

            <button 
  class="calendar-btn" 
  id="prev-month">
  &#10094;
</button>

<h2 class="month-year" id="month-year"></h2>

<button 
  class="calendar-btn" 
  id="next-month">
  &#10095;
</button>

        </div>

        <div class="calendar-weekdays">
            <span>Mo</span>
            <span>Tu</span>
            <span>We</span>
            <span>Th</span>
            <span>Fr</span>
            <span>Sa</span>
            <span>Su</span>
        </div>

       <div class="calendar-days" id="calendar-days"></div>
    </section>

    <!-- Timeline -->

    <section id="timeline">

        <div class="timeline-header">

            <h2 class="timeline-title">Today</h2>

            <button class="new-event-btn">
                + New Event
            </button>

        </div>
        
        <div class="timeline-list">

            <div class="timeline-card">

                <span class="time">09:00</span>

                <div class="timeline-info">

                    <h3>Dashboard Development</h3>

                    <p>Finish the calendar redesign.</p>

                </div>

            </div>

            <div class="timeline-card">

                <span class="time">18:00</span>

                <div class="timeline-info">

                    <h3>Basketball Practice</h3>

                    <p>Team training.</p>

                </div>

            </div>

        </div>

    </section>

</aside>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
